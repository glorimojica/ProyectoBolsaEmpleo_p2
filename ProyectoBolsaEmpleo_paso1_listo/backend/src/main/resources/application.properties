spring.application.name=ProyectoBolsaEmpleo

# Puerto
server.port=8080

# ======================
# BASE DE DATOS MYSQL
# ======================
spring.datasource.url=jdbc:mysql://localhost:3306/bolsa_empleo?useUnicode=true&characterEncoding=UTF-8&serverTimezone=America/Costa_Rica
spring.datasource.username=root
spring.datasource.password=Gmoro1601
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ======================
# JPA / HIBERNATE
# ======================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ======================
# THYMELEAF
# ======================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ======================
# SUBIDA DE ARCHIVOS
# ======================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Carpeta de uploads
app.upload.dir=uploads/

# ======================
# ERRORES
# ======================
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always
