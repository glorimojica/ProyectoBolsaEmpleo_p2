<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi CV</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background-color: #f4f6f8;
      color: #333;
      min-height: 100vh;
    }

    nav {
      background-color: #1f2937;
      padding: 14px 30px;
    }

    .nav-contenido {
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .logo {
      color: white;
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 600;
    }

    .nav-links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: rgba(255,255,255,0.88);
      text-decoration: none;
      font-size: 0.92rem;
    }

    .nav-links a:hover {
      color: white;
    }

    .pagina {
      padding: 36px 20px;
    }

    .contenedor {
      max-width: 600px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border: 1px solid #d9e1e7;
      border-radius: 10px;
      padding: 28px;
    }

    .card h1 {
      font-size: 1.45rem;
      color: #22364d;
      margin-bottom: 6px;
    }

    .subtitulo {
      color: #6b7280;
      font-size: 0.92rem;
      margin-bottom: 22px;
      line-height: 1.5;
    }

    .alerta-error {
      background: #fdeeee;
      color: #c53030;
      border: 1px solid #f2c6c6;
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 18px;
      font-size: 0.92rem;
    }

    .campo {
      margin-bottom: 18px;
    }

    .campo label {
      display: block;
      font-size: 0.84rem;
      color: #555;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .campo input[type="file"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccd4dd;
      border-radius: 6px;
      font-size: 0.94rem;
      font-family: inherit;
      background-color: #fafbfd;
    }

    .acciones {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.92rem;
      border: 1px solid transparent;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-principal {
      background-color: #2f6fad;
      color: white;
    }

    .btn-principal:hover {
      background-color: #275e92;
    }

    .btn-secundario {
      background-color: #eef3f7;
      color: #27405d;
      border-color: #cfd9e3;
    }

    .btn-secundario:hover {
      background-color: #e3ebf2;
    }

    .bloque {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid #e8edf2;
    }

    .bloque p {
      color: #6b7280;
      font-size: 0.92rem;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-contenido">
    <a class="logo" th:href="@{/oferente/dashboard}">BolsaEmpleo</a>

    <div class="nav-links">
      <a th:href="@{/oferente/dashboard}">Dashboard</a>
      <a th:href="@{/oferente/habilidades}">Mis habilidades</a>
      <a th:href="@{/oferente/cv}">Mi CV</a>
    </div>
  </div>
</nav>

<div class="pagina">
  <div class="contenedor">
    <div class="card">
      <h1>Mi CV</h1>
      <p class="subtitulo">Adjunta tu currículum en formato PDF.</p>

      <div class="alerta-error" th:if="${error}" th:text="${error}"></div>

      <form th:action="@{/oferente/cv}" method="post" enctype="multipart/form-data">
        <div class="campo">
          <label for="archivo">Archivo PDF</label>
          <input type="file" id="archivo" name="archivo" accept="application/pdf" required>
        </div>

        <div class="acciones">
          <button type="submit" class="btn btn-principal">Subir CV</button>
          <a th:href="@{/oferente/dashboard}" class="btn btn-secundario">Volver</a>
        </div>
      </form>

      <div class="bloque" th:if="${oferente.cvNombreArchivo != null}">
        <p>Ya tienes un archivo cargado.</p>
        <a th:href="@{/oferente/cv/ver}" target="_blank" class="btn btn-principal">Ver CV actual</a>
      </div>
    </div>
  </div>
</div>

</body>
</html>
