<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis puestos</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background-color: #f4f6f8;
      color: #333;
      min-height: 100vh;
    }

    nav {
      background-color: #1f2937;
      padding: 14px 30px;
    }

    .nav-contenido {
      max-width: 1150px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .logo {
      color: white;
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 600;
    }

    .nav-links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: rgba(255,255,255,0.88);
      text-decoration: none;
      font-size: 0.92rem;
    }

    .nav-links a:hover {
      color: white;
    }

    .pagina {
      padding: 36px 20px;
    }

    .contenedor {
      max-width: 1150px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border: 1px solid #d9e1e7;
      border-radius: 10px;
      padding: 28px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .header h1 {
      font-size: 1.5rem;
      color: #22364d;
      margin-bottom: 6px;
    }

    .header p {
      color: #6b7280;
      font-size: 0.92rem;
    }

    .acciones-superiores {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.92rem;
      border: 1px solid transparent;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-principal {
      background-color: #2f6fad;
      color: white;
    }

    .btn-principal:hover {
      background-color: #275e92;
    }

    .btn-secundario {
      background-color: #eef3f7;
      color: #27405d;
      border-color: #cfd9e3;
    }

    .btn-secundario:hover {
      background-color: #e3ebf2;
    }

    .btn-danger {
      background-color: #d9534f;
      color: white;
      border: none;
    }

    .btn-danger:hover {
      background-color: #c64541;
    }

    .btn-success {
      background-color: #2f855a;
      color: white;
      border: none;
    }

    .btn-success:hover {
      background-color: #276749;
    }

    .tabla-wrapper {
      overflow-x: auto;
      border: 1px solid #dde3ea;
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
      background: white;
    }

    thead {
      background-color: #f3f5f7;
    }

    th, td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid #e7edf2;
      vertical-align: middle;
      font-size: 0.92rem;
    }

    th {
      color: #32465a;
      font-weight: 600;
    }

    tbody tr:nth-child(even) {
      background-color: #fafbfd;
    }

    .badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .badge-publico {
      background-color: #e8f0f8;
      color: #2f6fad;
      border: 1px solid #c6d8ea;
    }

    .badge-privado {
      background-color: #efefef;
      color: #555;
      border: 1px solid #d6d6d6;
    }

    .badge-activo {
      background-color: #eaf7ef;
      color: #2f855a;
      border: 1px solid #c7e5d3;
    }

    .badge-inactivo {
      background-color: #fdeeee;
      color: #c53030;
      border: 1px solid #f2c6c6;
    }

    .acciones {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .empty-box {
      background: #fafbfd;
      border: 1px dashed #c7d1dc;
      border-radius: 8px;
      padding: 30px 20px;
      text-align: center;
      color: #6b7280;
      font-size: 0.94rem;
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-contenido">
    <a class="logo" th:href="@{/empresa/dashboard}">BolsaEmpleo</a>

    <div class="nav-links">
      <a th:href="@{/empresa/dashboard}">Dashboard</a>
      <a th:href="@{/empresa/puestos}">Mis puestos</a>
      <a th:href="@{/empresa/puestos/nuevo}">Publicar puesto</a>
    </div>
  </div>
</nav>

<div class="pagina">
  <div class="contenedor">
    <div class="card">
      <div class="header">
        <div>
          <h1>Mis puestos</h1>
          <p>Administra las vacantes que has publicado.</p>
        </div>

        <div class="acciones-superiores">
          <a th:href="@{/empresa/dashboard}" class="btn btn-secundario">Volver</a>
          <a th:href="@{/empresa/puestos/nuevo}" class="btn btn-principal">Crear puesto</a>
        </div>
      </div>

      <div th:if="${#lists.isEmpty(puestos)}" class="empty-box">
        No has creado puestos todavía.
      </div>

      <div th:if="${not #lists.isEmpty(puestos)}" class="tabla-wrapper">
        <table>
          <thead>
          <tr>
            <th>ID</th>
            <th>Título</th>
            <th>Salario</th>
            <th>Tipo</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="puesto : ${puestos}">
            <td th:text="${puesto.id}">1</td>
            <td th:text="${puesto.titulo}">Desarrollador</td>
            <td th:text="${puesto.salario}">850000</td>
            <td>
                            <span th:class="${puesto.publico} ? 'badge badge-publico' : 'badge badge-privado'"
                                  th:text="${puesto.publico} ? 'Público' : 'Privado'">Público</span>
            </td>
            <td>
                            <span th:class="${puesto.activo} ? 'badge badge-activo' : 'badge badge-inactivo'"
                                  th:text="${puesto.activo} ? 'Activo' : 'Inactivo'">Activo</span>
            </td>
            <td>
              <div class="acciones">
                <a th:href="@{/empresa/puestos/{id}(id=${puesto.id})}" class="btn btn-principal">Detalle</a>
                <a th:href="@{/empresa/puestos/{id}/requisitos(id=${puesto.id})}" class="btn btn-principal">Requisitos</a>
                <a th:href="@{/empresa/puestos/{id}/candidatos(id=${puesto.id})}" class="btn btn-principal">Candidatos</a>

                <form th:action="@{/empresa/puestos/{id}/toggle(id=${puesto.id})}" method="post" style="display:inline;">
                  <button type="submit"
                          th:class="${puesto.activo} ? 'btn btn-danger' : 'btn btn-success'"
                          th:text="${puesto.activo} ? 'Desactivar' : 'Activar'">
                    Desactivar
                  </button>
                </form>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

</body>
</html>
