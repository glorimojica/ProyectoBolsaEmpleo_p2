<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Requisitos del puesto</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f4f6f8;
            color: #333;
            min-height: 100vh;
        }

        nav {
            background-color: #1f2937;
            padding: 14px 30px;
        }

        .nav-contenido {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .logo {
            color: white;
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 600;
        }

        .nav-links {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: rgba(255,255,255,0.88);
            text-decoration: none;
            font-size: 0.92rem;
        }

        .nav-links a:hover {
            color: white;
        }

        .pagina {
            padding: 36px 20px;
        }

        .contenedor {
            max-width: 1050px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border: 1px solid #d9e1e7;
            border-radius: 10px;
            padding: 28px;
            margin-bottom: 18px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.5rem;
            color: #22364d;
            margin-bottom: 6px;
        }

        .header p {
            color: #6b7280;
            font-size: 0.92rem;
        }

        .alerta-error {
            background: #fdeeee;
            color: #c53030;
            border: 1px solid #f2c6c6;
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 18px;
            font-size: 0.92rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 180px auto;
            gap: 14px;
            align-items: end;
        }

        .campo label {
            display: block;
            font-size: 0.84rem;
            color: #555;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .campo input,
        .campo select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccd4dd;
            border-radius: 6px;
            font-size: 0.94rem;
            font-family: inherit;
            background-color: #fafbfd;
        }

        .campo input:focus,
        .campo select:focus {
            outline: none;
            border-color: #2f6fad;
            background-color: white;
        }

        .btn {
            display: inline-block;
            padding: 10px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.92rem;
            border: 1px solid transparent;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-principal {
            background-color: #2f6fad;
            color: white;
        }

        .btn-principal:hover {
            background-color: #275e92;
        }

        .btn-secundario {
            background-color: #eef3f7;
            color: #27405d;
            border-color: #cfd9e3;
        }

        .btn-secundario:hover {
            background-color: #e3ebf2;
        }

        .btn-danger {
            background-color: #d9534f;
            color: white;
            border: none;
        }

        .btn-danger:hover {
            background-color: #c64541;
        }

        .tabla-wrapper {
            overflow-x: auto;
            border: 1px solid #dde3ea;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
            background: white;
        }

        thead {
            background-color: #f3f5f7;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e7edf2;
            font-size: 0.92rem;
        }

        th {
            color: #32465a;
            font-weight: 600;
        }

        tbody tr:nth-child(even) {
            background-color: #fafbfd;
        }

        @media (max-width: 850px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-contenido">
        <a class="logo" th:href="@{/empresa/dashboard}">BolsaEmpleo</a>

        <div class="nav-links">
            <a th:href="@{/empresa/dashboard}">Dashboard</a>
            <a th:href="@{/empresa/puestos}">Mis puestos</a>
            <a th:href="@{/empresa/puestos/nuevo}">Publicar puesto</a>
        </div>
    </div>
</nav>

<div class="pagina">
    <div class="contenedor">
        <div class="card">
            <div class="header">
                <div>
                    <h1>Requisitos del puesto</h1>
                    <p>
                        <strong>Puesto:</strong>
                        <span th:text="${puesto.titulo}">Desarrollador</span>
                    </p>
                </div>

                <a th:href="@{/empresa/puestos}" class="btn btn-secundario">Volver</a>
            </div>

            <div th:if="${error}" class="alerta-error" th:text="${error}"></div>

            <form th:action="@{/empresa/puestos/{id}/requisitos(id=${puesto.id})}" method="post">
                <div class="form-grid">
                    <div class="campo">
                        <label for="caracteristicaId">Característica</label>
                        <select name="caracteristicaId" id="caracteristicaId" required>
                            <option value="">Seleccione una opción</option>
                            <option th:each="c : ${caracteristicas}"
                                    th:value="${c.id}"
                                    th:text="${c.nombre}">
                            </option>
                        </select>
                    </div>

                    <div class="campo">
                        <label for="nivel">Nivel requerido</label>
                        <input type="number" id="nivel" name="nivel" min="1" max="5" required>
                    </div>

                    <div>
                        <button type="submit" class="btn btn-principal">Agregar requisito</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="card">
            <div class="tabla-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Característica</th>
                        <th>Nivel</th>
                        <th>Acción</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="r : ${requisitos}">
                        <td th:text="${r.id}">1</td>
                        <td th:text="${r.caracteristica.nombre}">Java</td>
                        <td th:text="${r.nivel}">4</td>
                        <td>
                            <form th:action="@{/empresa/puestos/{puestoId}/requisitos/{reqId}/eliminar(puestoId=${puesto.id}, reqId=${r.id})}"
                                  method="post">
                                <button type="submit" class="btn btn-danger">Eliminar</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

</body>
</html>
