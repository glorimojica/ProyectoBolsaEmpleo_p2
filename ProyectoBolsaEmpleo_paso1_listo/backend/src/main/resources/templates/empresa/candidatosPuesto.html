<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidatos del puesto</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f4f6f8;
            color: #333;
            min-height: 100vh;
        }

        nav {
            background-color: #1f2937;
            padding: 14px 30px;
        }

        .nav-contenido {
            max-width: 1150px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .logo {
            color: white;
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 600;
        }

        .nav-links {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: rgba(255,255,255,0.88);
            text-decoration: none;
            font-size: 0.92rem;
        }

        .nav-links a:hover {
            color: white;
        }

        .pagina {
            padding: 36px 20px;
        }

        .contenedor {
            max-width: 1150px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border: 1px solid #d9e1e7;
            border-radius: 10px;
            padding: 28px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 22px;
        }

        .header h1 {
            font-size: 1.5rem;
            color: #22364d;
            margin-bottom: 6px;
        }

        .header p {
            color: #6b7280;
            font-size: 0.92rem;
        }

        .btn {
            display: inline-block;
            padding: 10px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.92rem;
            border: 1px solid transparent;
        }

        .btn-secundario {
            background-color: #eef3f7;
            color: #27405d;
            border-color: #cfd9e3;
        }

        .btn-secundario:hover {
            background-color: #e3ebf2;
        }

        .btn-principal {
            background-color: #2f6fad;
            color: white;
        }

        .btn-principal:hover {
            background-color: #275e92;
        }

        .tabla-wrapper {
            overflow-x: auto;
            border: 1px solid #dde3ea;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 850px;
            background: white;
        }

        thead {
            background-color: #f3f5f7;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e7edf2;
            font-size: 0.92rem;
        }

        th {
            color: #32465a;
            font-weight: 600;
        }

        tbody tr:nth-child(even) {
            background-color: #fafbfd;
        }

        .empty-box {
            background: #fafbfd;
            border: 1px dashed #c7d1dc;
            border-radius: 8px;
            padding: 30px 20px;
            text-align: center;
            color: #6b7280;
            font-size: 0.94rem;
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-contenido">
        <a class="logo" th:href="@{/empresa/dashboard}">BolsaEmpleo</a>

        <div class="nav-links">
            <a th:href="@{/empresa/dashboard}">Dashboard</a>
            <a th:href="@{/empresa/puestos}">Mis puestos</a>
            <a th:href="@{/empresa/puestos/nuevo}">Publicar puesto</a>
        </div>
    </div>
</nav>

<div class="pagina">
    <div class="contenedor">
        <div class="card">
            <div class="header">
                <div>
                    <h1>Candidatos del puesto</h1>
                    <p>
                        <strong>Puesto:</strong>
                        <span th:text="${puesto.titulo}">Desarrollador</span>
                    </p>
                </div>

                <a th:href="@{/empresa/puestos}" class="btn btn-secundario">Volver</a>
            </div>

            <div th:if="${#lists.isEmpty(candidatos)}" class="empty-box">
                No hay candidatos para este puesto.
            </div>

            <div th:if="${not #lists.isEmpty(candidatos)}" class="tabla-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Correo</th>
                        <th>Requisitos cumplidos</th>
                        <th>Match</th>
                        <th>Acción</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c : ${candidatos}">
                        <td th:text="${c.oferente.nombre}">Nombre</td>
                        <td th:text="${c.oferente.apellido}">Apellido</td>
                        <td th:text="${c.oferente.usuario.correo}">correo@correo.com</td>
                        <td>
                            <span th:text="${c.requisitosCumplidos}">0</span> /
                            <span th:text="${c.totalRequisitos}">0</span>
                        </td>
                        <td th:text="${c.porcentajeMatch + '%'}">0%</td>
                        <td>
                            <a th:href="@{/empresa/candidatos/{id}(id=${c.oferente.id})}" class="btn btn-principal">Ver detalle</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

</body>
</html>
